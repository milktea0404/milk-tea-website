
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<title>SM Tendency Diagnosis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800&family=Shippori+Mincho:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
:root{--bg:#0a0a0f;--bg-2:#13131c;--fg:#f5f5f7;--muted:#8b8b95;--line:rgba(255,255,255,0.08);--accent:#e879f9;--accent-2:#a78bfa;--accent-3:#f472b6;}
html,body{background:var(--bg);font-family:'Zen Kaku Gothic New','Inter',system-ui,sans-serif;color:var(--fg);min-height:100vh;overflow-x:hidden;}
body{background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(232,121,249,0.15),transparent),radial-gradient(ellipse 60% 40% at 80% 110%,rgba(167,139,250,0.12),transparent),var(--bg);background-attachment:fixed;}
button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit;}
.mono{font-family:'Inter',monospace;font-feature-settings:"tnum";}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes shine{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes blob{0%,100%{border-radius:50% 40% 60% 50%;transform:rotate(0)}50%{border-radius:40% 60% 40% 60%;transform:rotate(180deg)}}
.app{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;}
.screen{flex:1;display:flex;flex-direction:column;animation:fadeIn 0.4s ease;}
.container{width:100%;max-width:560px;margin:0 auto;padding:0 1.5rem;}
.intro{justify-content:center;align-items:center;padding:2rem 0;position:relative;overflow:hidden;}
.intro-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:40px 40px;mask-image:radial-gradient(ellipse at center,black 30%,transparent 80%);}
.intro-blob{position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(232,121,249,0.25),transparent 70%);filter:blur(40px);animation:blob 20s ease-in-out infinite;pointer-events:none;}
.intro-blob.b1{top:-100px;left:-100px;}
.intro-blob.b2{bottom:-100px;right:-100px;background:radial-gradient(circle,rgba(167,139,250,0.25),transparent 70%);animation-delay:-10s;}
.intro-content{position:relative;z-index:1;text-align:center;animation:slideUp 0.8s cubic-bezier(0.16,1,0.3,1);}
.intro-eyebrow{display:inline-flex;align-items:center;gap:0.5rem;padding:0.4rem 0.9rem;background:rgba(255,255,255,0.04);border:1px solid var(--line);border-radius:100px;font-size:0.72rem;letter-spacing:0.2em;color:var(--muted);margin-bottom:1.5rem;}
.intro-eyebrow::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 2s ease infinite;}
.intro-title{font-family:'Shippori Mincho',serif;font-size:clamp(2.4rem,11vw,4.5rem);font-weight:600;line-height:1.1;letter-spacing:-0.02em;margin-bottom:0.6rem;background:linear-gradient(180deg,#fff 0%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.intro-subtitle{font-size:0.9rem;color:var(--muted);letter-spacing:0.3em;margin-bottom:2.5rem;text-transform:uppercase;font-weight:300;}
.intro-meta{display:flex;justify-content:center;gap:2rem;margin-bottom:3rem;}
.intro-meta-item{text-align:center;}
.intro-meta-num{font-family:'Shippori Mincho',serif;font-size:2rem;font-weight:500;color:var(--fg);line-height:1;margin-bottom:0.3rem;}
.intro-meta-label{font-size:0.7rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;}
.intro-divider{width:1px;background:var(--line);}
.intro-btn{position:relative;display:inline-flex;align-items:center;gap:0.6rem;padding:1.1rem 3rem;background:var(--fg);color:var(--bg);border-radius:100px;font-size:0.95rem;font-weight:600;letter-spacing:0.05em;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);overflow:hidden;}
.intro-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(232,121,249,0.4),transparent);background-size:200% 100%;animation:shine 3s linear infinite;}
.intro-btn:hover{transform:translateY(-2px);box-shadow:0 20px 40px rgba(232,121,249,0.3);}
.intro-btn span{position:relative;z-index:1;}
.intro-btn .arrow{transition:transform 0.3s ease;}
.intro-btn:hover .arrow{transform:translateX(4px);}
.intro-note{margin-top:2rem;color:#4a4a55;font-size:0.72rem;letter-spacing:0.1em;}
.quiz{padding:2rem 0;}
.quiz-header{padding:0 1.5rem;margin-bottom:2.5rem;}
.quiz-progress{display:flex;align-items:center;gap:1rem;margin-bottom:0.8rem;}
.quiz-progress-text{font-family:'Shippori Mincho',serif;font-size:0.85rem;color:var(--muted);font-feature-settings:"tnum";}
.quiz-progress-num{color:var(--fg);font-weight:500;}
.quiz-progress-bar{flex:1;height:2px;background:rgba(255,255,255,0.06);border-radius:100px;overflow:hidden;}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent-2),var(--accent));border-radius:100px;transition:width 0.6s cubic-bezier(0.16,1,0.3,1);}
.quiz-card{padding:0 1.5rem;animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1);}
.quiz-card.exit{animation:fadeUp 0.25s reverse;}
.q-num{font-family:'Shippori Mincho',serif;font-size:0.78rem;color:var(--muted);letter-spacing:0.3em;text-transform:uppercase;margin-bottom:1.5rem;display:flex;align-items:center;gap:0.5rem;}
.q-num::after{content:'';flex:1;height:1px;background:var(--line);}
.q-text{font-family:'Shippori Mincho',serif;font-size:clamp(1.15rem,4vw,1.45rem);line-height:1.85;color:var(--fg);margin-bottom:2.5rem;font-weight:400;}
.q-options{display:flex;flex-direction:column;gap:0.6rem;}
.q-opt{display:flex;align-items:center;gap:1rem;padding:1.1rem 1.4rem;background:rgba(255,255,255,0.025);border:1px solid var(--line);border-radius:14px;text-align:left;font-size:0.95rem;color:#c5c5cd;transition:all 0.25s cubic-bezier(0.16,1,0.3,1);width:100%;}
.q-opt:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.15);transform:translateX(4px);}
.q-opt.selected{background:rgba(232,121,249,0.08);border-color:var(--accent);color:var(--fg);}
.q-opt-marker{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--line);font-size:0.75rem;font-weight:600;color:var(--muted);transition:all 0.25s ease;font-family:'Inter',sans-serif;}
.q-opt.selected .q-opt-marker{background:var(--accent);border-color:var(--accent);color:white;}
.q-opt-label{flex:1;}
.q-back{margin-top:2rem;padding:0.6rem 1rem;color:var(--muted);font-size:0.8rem;letter-spacing:0.1em;display:flex;align-items:center;gap:0.5rem;}
.q-back:hover{color:var(--fg);}
.result{padding:1.5rem 0 4rem;}
.result-hero{position:relative;padding:1rem 1.5rem 0;animation:scaleIn 0.7s cubic-bezier(0.34,1.56,0.64,1);}
.result-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.result-glow{position:absolute;width:100%;height:60%;top:0;left:0;background:radial-gradient(ellipse at center top,var(--type-glow) 0%,transparent 60%);opacity:0.4;}
.result-char{position:relative;z-index:1;display:flex;justify-content:center;margin-bottom:1.5rem;animation:float 5s ease-in-out infinite;}
.result-meta{position:relative;z-index:1;text-align:center;margin-bottom:2rem;animation:fadeUp 0.6s 0.2s both;}
.result-cat{display:inline-flex;align-items:center;gap:0.5rem;padding:0.35rem 0.9rem;border:1px solid currentColor;border-radius:100px;font-size:0.7rem;letter-spacing:0.25em;text-transform:uppercase;margin-bottom:1.2rem;font-weight:500;font-family:'Inter',sans-serif;}
.result-cat::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;}
.result-name{font-family:'Shippori Mincho',serif;font-size:clamp(1.8rem,7vw,2.6rem);font-weight:600;line-height:1.25;letter-spacing:0.02em;margin-bottom:0.3rem;}
.result-name-en{font-size:0.7rem;color:var(--muted);letter-spacing:0.4em;text-transform:uppercase;}
.result-section{padding:1rem 1.5rem;animation:fadeUp 0.6s both;}
.result-section.delay-1{animation-delay:0.4s;}
.result-section.delay-2{animation-delay:0.55s;}
.result-section.delay-3{animation-delay:0.7s;}
.result-section.delay-4{animation-delay:0.85s;}
.section-label{font-family:'Inter',sans-serif;font-size:0.68rem;color:var(--muted);letter-spacing:0.3em;text-transform:uppercase;margin-bottom:0.9rem;display:flex;align-items:center;gap:0.6rem;font-weight:500;}
.section-label::before{content:'';width:16px;height:1px;background:var(--muted);}
.tags{display:flex;flex-wrap:wrap;gap:0.45rem;margin-bottom:1.2rem;}
.tag{padding:0.4rem 0.9rem;background:rgba(255,255,255,0.04);border:1px solid var(--line);border-radius:100px;font-size:0.78rem;color:#d5d5dd;}
.desc-card{background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid var(--line);border-radius:18px;padding:1.5rem;}
.desc-text{font-family:'Shippori Mincho',serif;line-height:2;color:#dcdce4;font-size:0.95rem;}
.tag-desc{color:var(--muted);font-size:0.82rem;line-height:1.85;margin-top:0.5rem;}
.notice{padding:1rem 1.2rem;border-radius:14px;font-size:0.82rem;line-height:1.75;display:flex;gap:0.7rem;align-items:flex-start;}
.notice-low{background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.2);color:#fda4a4;}
.notice-high{background:rgba(110,231,183,0.06);border:1px solid rgba(110,231,183,0.2);color:#86efac;}
.notice-icon{flex-shrink:0;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;}
.compat-grid{display:grid;grid-template-columns:1fr;gap:0.7rem;}
.compat-card{background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid var(--line);border-radius:16px;padding:1.2rem 1.4rem;}
.compat-header{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.9rem;}
.compat-mark{font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:700;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.compat-mark.ok{background:rgba(110,231,183,0.15);color:#6ee7b7;}
.compat-mark.ng{background:rgba(248,113,113,0.15);color:#f87171;}
.compat-title{font-size:0.78rem;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;font-weight:500;}
.compat-list{list-style:none;display:flex;flex-direction:column;gap:0.4rem;}
.compat-item{font-family:'Shippori Mincho',serif;font-size:0.92rem;color:#dcdce4;padding-left:1rem;position:relative;line-height:1.6;}
.compat-item::before{content:'';position:absolute;left:0;top:0.7rem;width:5px;height:1px;background:var(--muted);}
.actions{display:flex;flex-direction:column;gap:0.7rem;align-items:stretch;margin-top:2rem;padding:0 0.5rem;}
.action-btn{padding:1rem;border-radius:100px;font-size:0.9rem;letter-spacing:0.08em;transition:all 0.25s ease;display:flex;align-items:center;justify-content:center;gap:0.5rem;font-weight:500;}
.action-primary{background:var(--fg);color:var(--bg);}
.action-primary:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(255,255,255,0.15);}
.action-secondary{background:rgba(255,255,255,0.04);border:1px solid var(--line);color:#c5c5cd;}
.action-secondary:hover{background:rgba(255,255,255,0.08);}
@media (min-width:640px){.compat-grid{grid-template-columns:1fr 1fr;}.actions{flex-direction:row;justify-content:center;}.action-btn{padding:1rem 2.4rem;}}
</style>
</head>
<body>
<div id="app" class="app"></div>
<script>
const QUESTIONS = [
  "相手が自分の反応を細かく見ていると、緊張するより安心する。",
  "自分が場の空気をコントロールしていると、落ち着く。",
  "言葉で追い詰められるより、沈黙で圧をかけられる方が印象に残る。",
  "相手が少し困った顔をすると、もっと反応を見たくなることがある。",
  "自分の意思を一度預けてもいいと思える相手には、強く惹かれる。",
  "身体的な刺激より、心理的な駆け引きの方が強く残る。",
  "相手に「待て」と言われる状況は、嫌悪よりも高揚に近い。",
  "自分が誰かを導く立場になると、自然に言葉が強くなる。",
  "相手の余裕が崩れる瞬間に、魅力を感じることがある。",
  "優しくされるより、少し試される方が相手の本気を感じる。",
  "親密な相手には、自分の弱さを見抜かれてもいいと思う。",
  "相手の反応に合わせて、自分の態度を意図的に変えることが多い。",
  "強い言葉を向けられても、信頼できる相手ならむしろ距離が縮まる。",
  "身体の自由を少し制限される状況に、怖さよりも集中を感じる。",
  "相手が自分に従ってくれると、安心よりも責任感が先に来る。",
  "相手に主導権を渡すには、かなり深い信頼が必要だと思う。",
  "自分の言葉ひとつで相手の態度が変わると、満足感がある。",
  "相手に見透かされているような感覚が嫌いではない。",
  "ルールがある状況の方が、自由な状況より安心して振る舞える。",
  "相手を褒めるより、少し煽って反応を引き出す方が得意だ。",
  "自分が上に立つより、相手の意思に巻き込まれる方が楽な時がある。",
  "身体的な接触そのものより、そこに至るまでの緊張感が重要だ。",
  "相手が自分を怖がりすぎると、興味が薄れる。",
  "相手の命令口調に、反発よりも集中が生まれることがある。",
  "自分が優位な立場でも、相手の同意や反応確認がないと楽しめない。",
  "強い刺激よりも、じわじわ逃げ場をなくされる感覚の方が印象深い。",
  "相手を守るためなら、自分が悪役のような役回りになっても構わない。",
  "恋愛や親密な関係では、対等でいるより役割がはっきりしている方が燃える。",
  "相手に逆らえない状況より、逆らっても受け止められる状況に惹かれる。",
  "相手の呼吸や表情の変化を読むのが得意だと思う。",
  "自分の中の支配欲や服従欲は、昔からあるというより経験で強まった感覚がある。",
  "痛みそのものより、それを与える／受ける関係性の意味に興味がある。",
  "相手から制限や条件を与えられると、普段より自分の感覚が鋭くなる。",
  "相手の限界を探るより、限界の手前で揺らす方が好みだ。",
  "自分が求められていると感じると、自然に相手を受け入れる側に回る。",
  "言葉で支配するより、態度や視線で空気を支配する方がしっくりくる。",
  "相手の前で乱れるより、相手を乱す方に興味がある。",
  "自分の欲求は、特定の相手や経験によって後から形になったと思う。",
  "親密な場面では、安心感と少しの怖さが同時にある方が惹かれる。",
  "相手が自分のために我慢していると感じると、強く反応してしまう。",
  "相手に任せるより、自分で流れを決めた方が最後まで集中できる。",
  "優しく扱われ続けると、少し物足りなく感じることがある。",
  "相手を従わせるより、相手が自分から従いたくなる空気を作りたい。",
  "強く扱われることより、「逃げてもいい」と分かった上で捕まる感覚に惹かれる。",
  "相手の感情を揺らすより、自分の感情を揺らされる方が記憶に残る。",
  "身体的な刺激がなくても、命令・禁止・許可だけで気持ちが動く。",
  "主導権を持つ側にも、持たれる側にも、相手次第で自然に入れる。",
  "自分の嗜好は、生まれつきというより「許された経験」で開いた気がする。",
  "相手を傷つけたいというより、相手の奥にある本音を引き出したい。",
  "自分の快感は、身体・精神・関係性のどれか一つではなく、複数が重なった時に強くなる。",
];

const SM = [
  [{M:1,PSY:1,FOLLOW:1},{NEU:1},{LEAD:1}],

  [{S:1,PSY:1,LEAD:2,SAFE:1},{S:1,LEAD:1},{DS:1,S:1}],

  [{M:2,PSY:1,FOLLOW:2},{M:1,FOLLOW:1},{S:1,LEAD:1}],
  [{PSY:2,S:1,M:1,SW:1},{PSY:1,NEU:1},{P:2}],

  [{S:1,PSY:2,LEAD:1,SW:1,NAT:1},{PSY:1,SW:1},{NEU:1}],

  [{M:2,DM:1,PSY:2,FOLLOW:1},{M:1,PSY:1},{NEU:1}],
  [{S:2,PSY:2,LEAD:1,SAFE:1},{S:1,PSY:1},{NEU:1}],
  [{M:2,PSY:1,FOLLOW:2},{M:1,FOLLOW:1},{LEAD:1,NEU:1}],
  [{S:2,PSY:2,LEAD:2,NAT:1},{S:1,PSY:1},{NEU:1}],
  [{S:3,DS:1,LEAD:2},{S:1,SW:1},{M:1,FOLLOW:1}],

function calcScores(answers) {
  const sc = {S:0,M:0,DS:0,DM:0,P:0,PSY:0,LEAD:0,FOLLOW:0,SW:0,NAT:0,ACQ:0,NEU:0,SAFE:0};
  for (let i = 0; i < 50; i++) {
    const a = answers[i];
    const src = a==='yes' ? SM[i][0] : a==='neutral' ? SM[i][1] : SM[i][2];
    if (src) for (const k in src) sc[k] = (sc[k]||0) + src[k];
  }
  return sc;
}

function calcAxes(sc) {
  const St=sc.S+sc.DS, Mt=sc.M+sc.DM, diff=St-Mt;
  let smType;
  if (St>15&&Mt>15&&sc.SW>8) smType='SW_both';
  else if (diff>=12&&sc.DS>=5) smType='DS';
  else if (diff<=-12&&sc.DM>=5) smType='DM';
  else if (diff>=5) smType='S';
  else if (diff<=-5) smType='M';
  else smType='neutral';
  const pd=sc.P-sc.PSY;
  const pmType=pd>=5?'P':pd<=-5?'PSY':(sc.P>=8&&sc.PSY>=8)?'both':'low';
  const ld=sc.LEAD-sc.FOLLOW;
  const lfType=(sc.LEAD>10&&sc.FOLLOW>10)?'variable':ld>=5?'LEAD':ld<=-5?'FOLLOW':sc.SW>=5?'SW':'neutral';
  const nd=sc.NAT-sc.ACQ;
  const naType=(sc.NAT<3&&sc.ACQ<3)?'undefined':nd>=4?'NAT':nd<=-4?'ACQ':'mixed';
  const safeLevel=sc.SAFE>=5?'high':sc.SAFE<=2?'low':'medium';
  return {smType,pmType,lfType,naType,safeLevel,St,Mt,sc};
}

function getTypeName(a) {
  const {smType,pmType,lfType,naType,St,Mt,sc} = a;
  if (smType==='DS') {
    if (pmType==='both') return 'フルコース支配シェフ';
    if (pmType==='P') return '現場監督系ドS';
    return '心理戦の魔王課長';
  }
  if (smType==='S') {
    if (sc.SAFE>=5&&pmType==='PSY') return '悪役を引き受ける保護者';
    if (naType==='NAT'&&lfType==='LEAD') return '天然ボス猿インテリ';
    if (naType==='ACQ'&&pmType==='PSY') return '後天開花の黒幕';
    if (pmType==='P'&&lfType==='LEAD') return '反応観察ソムリエ';
    if (pmType==='both') return '加減上手の飼育員';
    return '静かな圧の参謀S';
  }
  if (smType==='DM') {
    if (pmType==='both') return '沼落ちフルコース受講生';
    if (pmType==='P') return 'タフグミ受け身職人';
    return '信頼預け型ドM';
  }
  if (smType==='M') {
    if (naType==='NAT'&&lfType==='FOLLOW') return '天然受け身の王族';
    if (naType==='ACQ') return '後天開花の沼の住人';
    if (pmType==='P'&&lfType==='FOLLOW') return 'リアクション芸人M';
    if (pmType==='both') return '甘やかされたい服従犬';
    if (sc.SW>=5&&pmType==='PSY') return '読まれたい策士';
    if (pmType==='PSY') return sc.FOLLOW>10?'空気で沈むM':'脳内正座の優等生';
    return '脳内正座の優等生';
  }
  if (smType==='SW_both') return '両面免許ゴールド保持者';
  if (St>8&&Mt>8&&sc.SW>=6) {
    if (naType==='ACQ') return '試着室の住人';
    if (naType==='NAT') return '天然カメレオン';
    if (pmType==='both') return '全部入り闇鍋スイッチ';
    if (pmType==='PSY') return '心理戦スイッチ軍師';
    if (pmType==='P') return '現場対応型スイッチ';
    if (lfType==='variable') return '気分で役職変える部長';
    return '補佐型スイッチ';
  }
  if (sc.SAFE>=5&&sc.NEU>=8) return '境界線ガチガチ警備員';
  if (sc.NEU>=8&&pmType==='PSY') return '観察席の評論家';
  if (pmType==='PSY') return 'ぬるま湯の哲学者';
  if (sc.LEAD<5&&sc.FOLLOW<5) return '完全対等の握手会代表';
  if (St+Mt<6) return '平和な変態未満';
  return '安全運転の一般通行人';
}

    <path d="M88 68 Q92 70 92 76 Q90 80 87 78" fill="${sk}" stroke="${stroke}" stroke-width="${sw}" stroke-linejoin="round"/>
    ${frontHairs[c.h]}
    ${faces[c.e] || faces.neutral}
    ${accs[c.a] || ''}
  </svg>`;
}

const state = {screen:'intro', current:0, answers:{}, result:null, busy:false};

function setState(p) {
  Object.assign(state, p);
  render();
}

function renderIntro() {
  return `<div class="screen intro"><div class="intro-grid"></div><div class="intro-blob b1"></div><div class="intro-blob b2"></div><div class="container"><div class="intro-content"><div class="intro-eyebrow">PSYCHOLOGICAL DIAGNOSIS</div><h1 class="intro-title">SM<br>Tendency</h1><div class="intro-subtitle">本当のあなたを知る</div><div class="intro-meta"><div class="intro-meta-item"><div class="intro-meta-num">50</div><div class="intro-meta-label">Questions</div></div><div class="intro-divider"></div><div class="intro-meta-item"><div class="intro-meta-num">33</div><div class="intro-meta-label">Types</div></div><div class="intro-divider"></div><div class="intro-meta-item"><div class="intro-meta-num">5</div><div class="intro-meta-label">Minutes</div></div></div><button class="intro-btn" onclick="onStart()"><span>診断を始める</span><span class="arrow">→</span></button><div class="intro-note">※ 18歳以上向け / 結果は外部に保存されません</div></div></div></div>`;
}

function renderQuiz() {
  const cur = state.current;
  const pct = (cur/50)*100;
  const ans = state.answers[cur];
  const opts = [{k:'yes',label:'はい',mark:'A'},{k:'neutral',label:'どちらでもない',mark:'B'},{k:'no',label:'いいえ',mark:'C'}];
  const optHTML = opts.map(o => {
    const sel = ans === o.k;
    return `<button class="q-opt ${sel?'selected':''}" onclick="onAnswer('${o.k}')"><div class="q-opt-marker">${o.mark}</div><div class="q-opt-label">${o.label}</div></button>`;
  }).join('');
  return `<div class="screen quiz"><div class="quiz-header"><div class="quiz-progress"><span class="quiz-progress-text mono"><span class="quiz-progress-num">${String(cur+1).padStart(2,'0')}</span> <span style="color:#4a4a55">/</span> 50</span><div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div></div></div><div id="qcard" class="quiz-card"><div class="container"><div class="q-num mono">QUESTION ${String(cur+1).padStart(2,'0')}</div><div class="q-text">${QUESTIONS[cur]}</div><div class="q-options">${optHTML}</div>${cur > 0 ? '<button class="q-back" onclick="onBack()"><span>←</span> 前の質問</button>' : ''}</div></div></div>`;
}

function renderResult() {
  const r = state.result;
  if (!r) return '';
  const {typeName, typeData, axes} = r;
  const ac = typeData.color;
  const glow = typeData.glow;
  const catLabel = {S:'DOMINANT',M:'SUBMISSIVE',SW:'SWITCH',NEU:'NEUTRAL'};
  const pm = PM_TAGS[axes.pmType] || PM_TAGS.low;
  const lf = LF_TAGS[axes.lfType] || LF_TAGS.neutral;
  const na = NA_TAGS[axes.naType] || NA_TAGS.undefined;
  const tags = [pm,lf,na].map(t => `<span class="tag">${t.name}</span>`).join('');
  const okList = (typeData.ok || []).map(t => `<li class="compat-item">${t}</li>`).join('');
  const ngList = (typeData.ng || []).map(t => `<li class="compat-item">${t}</li>`).join('');
  let safeMsg = '';
  if (axes.safeLevel === 'low') {
    safeMsg = `<div class="result-section delay-3"><div class="container"><div class="notice notice-low"><div class="notice-icon">!</div><div><strong style="color:#fca5a5">注意</strong>　刺激への反応が強い一方、境界線の確認が弱くなる可能性があります。安心できるルール作りを大切に。</div></div></div></div>`;
  } else if (axes.safeLevel === 'high') {
    safeMsg = `<div class="result-section delay-3"><div class="container"><div class="notice notice-high"><div class="notice-icon">✓</div><div><strong style="color:#86efac">補足</strong>　相手の反応や境界線を見ながら調整する力が高めです。相性の幅が広い傾向があります。</div></div></div></div>`;
  }
  return `<div class="screen result" style="--type-color:${ac};--type-glow:${glow}"><div class="result-hero"><div class="result-bg"><div class="result-glow"></div></div><div class="container"><div class="result-char">${charSVG(typeName, 240)}</div><div class="result-meta"><div class="result-cat" style="color:${ac}">${catLabel[typeData.cat] || ''}</div><h1 class="result-name" style="color:${ac};text-shadow:0 0 40px ${glow}">${typeName}</h1><div class="result-name-en mono">${typeData.en}</div></div></div></div><div class="result-section delay-1"><div class="container"><div class="section-label">Profile</div><div class="tags">${tags}</div><div class="tag-desc">${pm.desc}　${lf.desc}　${na.desc}</div></div></div><div class="result-section delay-2"><div class="container"><div class="section-label">Diagnosis</div><div class="desc-card"><div class="desc-text">${typeData.desc}</div></div></div></div>${safeMsg}<div class="result-section delay-4"><div class="container"><div class="section-label">Compatibility</div><div class="compat-grid"><div class="compat-card"><div class="compat-header"><div class="compat-mark ok">+</div><div class="compat-title">相性◎</div></div><ul class="compat-list">${okList}</ul></div><div class="compat-card"><div class="compat-header"><div class="compat-mark ng">−</div><div class="compat-title">相性✗</div></div><ul class="compat-list">${ngList}</ul></div></div><div class="actions"><button class="action-btn action-primary" onclick="onShare()"><span>結果をシェア</span><span>↗</span></button><button class="action-btn action-secondary" onclick="onRetry()">もう一度診断する</button></div></div></div></div>`;
}

function render() {
  const app = document.getElementById('app');
  if (state.screen === 'intro') app.innerHTML = renderIntro();
  else if (state.screen === 'quiz') app.innerHTML = renderQuiz();
  else if (state.screen === 'result') app.innerHTML = renderResult();
  window.scrollTo(0, 0);
}

function onStart() { setState({screen:'quiz', current:0, answers:{}}); }

function onAnswer(a) {
  if (state.busy) return;
  state.busy = true;
  state.answers[state.current] = a;
  render();
  setTimeout(() => {
    const card = document.getElementById('qcard');
    if (card) card.classList.add('exit');
    setTimeout(() => {
      if (state.current < 49) {
        state.current += 1;
        state.busy = false;
        render();
      } else {
        const scores = calcScores(state.answers);
        const axes = calcAxes(scores);
        const typeName = getTypeName(axes);
        const typeData = RD[typeName] || Object.values(RD)[0];
        state.busy = false;
        setState({screen:'result', result:{typeName, typeData, axes, scores}});
      }
    }, 230);
  }, 280);
}

function onBack() {
  if (state.busy || state.current === 0) return;
  state.busy = true;
  const card = document.getElementById('qcard');
  if (card) card.classList.add('exit');
  setTimeout(() => {
    state.current -= 1;
    state.busy = false;
    render();
  }, 230);
}

function onRetry() { setState({screen:'intro', current:0, answers:{}, result:null}); }

function onShare() {
  const r = state.result;
  if (!r) return;
  const text = `【SM Tendency Diagnosis】\n私のタイプは「${r.typeName}」でした。\n\n${r.typeData.desc}\n\n#SM傾向診断`;
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({title:'SM Tendency Diagnosis', text, url}).catch(()=>{});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text + '\n' + url).then(() => alert('結果をクリップボードにコピーしました')).catch(() => alert('シェアに失敗しました'));
  }
}

render();
</script>
</body>
</html>
